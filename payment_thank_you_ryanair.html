<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Payment Interface In Bootstrap 4</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style type="text/css">
      section {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      input[type='number']::-webkit-inner-spin-button,
      input[type='number']::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .fa-lock {
        background: #273746;
        color: #fff;
        line-height: 2.1;
        padding: 8%;
        width: 30px;
        text-align: center;
      }
      .container {
        margin-top: 10px !important;
      }
      @media (min-width: 360px) and (max-width: 767px) {
        .col-md-4 .form-group {
          margin-bottom: 0;
        }
      }
    </style>
  </head>

  <body>
    <section>
      <div class="container">
        <div class="row text-center">
              <div class="col-lg-12">
              <br><br> <h2 style="color: #144fcc">Thank you for your payment.</h2>
              <p style="font-size:20px;color:#5C5C5C;">We've sent you a confirmation email.</p>
          <br><br>
              </div>
              
        </div>
      </div>
    </section>
  </body>
